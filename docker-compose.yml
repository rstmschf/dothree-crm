services:
  db:
    image: postgres:16
    container_name: dothree_postgres_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - dothree_crm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: . 
    container_name: crm_web
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  frontend:
    build: ./frontend
    container_name: crm_frontend
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - media_volume:/app/media
    
  redis:
    image: redis:7-alpine
    container_name: crm_redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: crm_celery
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    container_name: crm_celery_beat
    command: celery -A config beat -l INFO
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  dothree_crm_pgdata:
  media_volume: